# /etc/pipewire/pipewire.conf.d/10-buffers.conf
# (or place under ~/.config/pipewire/pipewire.conf.d/ for a user-level override)
#
# Larger buffers reduce audio dropouts caused by Bluetooth radio jitter.
# 2048 samples ≈ 42ms latency at 48kHz, inaudible for music playback.
# If you experience stutters, increase to 4096 (~85ms) for more headroom.
context.properties = {
    default.clock.quantum       = 2048
    default.clock.min-quantum   = 2048
    default.clock.max-quantum   = 2048
}
